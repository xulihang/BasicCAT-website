  <!-- ===== Settings Tab ===== -->
  <div class="tab-panel hidden" id="panel-settings">
    <div class="settings-layout">
      <button class="btn-primary btn-save" id="btn-settings-save" data-i18n="settings_save">保存设置</button>
      <div class="settings-card">
        <div class="settings-card-title" data-i18n="settings_translation">翻译</div>
        <div class="form-row">
          <label>
            <span data-i18n="settings_source_lang">源语言</span>
            <select id="setting-sourceLang"></select>
          </label>
          <label>
            <span data-i18n="settings_target_lang">目标语言</span>
            <select id="setting-targetLang"></select>
          </label>
        </div>
        <div class="form-row">
          <label>
            <span data-i18n="settings_translation_mode">翻译模式</span>
            <select id="setting-translationMode">
              <option value="imagetrans" data-i18n="settings_mode_imagetrans">ImageTrans</option>
              <option value="local" data-i18n="settings_mode_local">本地PaddleOCR</option>
            </select>
          </label>
        </div>
        <div class="form-row">
          <label>
            <span data-i18n="settings_default_preset">默认预设</span>
            <select id="setting-defaultPresetTranslation">
              <option value="mymemory" data-i18n="settings_preset_mymemory">MyMemory</option>
            </select>
          </label>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title" data-i18n="settings_server">服务器连接</div>
        <div class="form-row">
          <label><span data-i18n="settings_server_url">服务器URL</span></label>
          <input type="text" id="setting-serverURL" class="wide" />
        </div>
        <div class="form-row">
          <button class="btn-secondary btn-sm" id="btn-public-server" data-i18n="settings_public_server">使用公共服务器</button>
          <button class="btn-secondary btn-sm" id="btn-local-server" data-i18n="settings_local_server">使用本地服务器</button>
        </div>
        <div class="form-row">
          <label><span data-i18n="settings_display_name">显示名称</span></label>
          <input type="text" id="setting-displayName" placeholder="default" />
          <button class="btn-secondary btn-sm" id="btn-check-instances" data-i18n="settings_check_instances">检查已有实例</button>
        </div>
        <div class="form-row">
          <label><span data-i18n="settings_password">密码（可选）</span></label>
          <input type="password" id="setting-password" />
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title" data-i18n="settings_rendering">图片捕捉和渲染</div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="setting-renderTextInFrontend" />
            <span data-i18n="settings_render_frontend">在前端渲染文字</span>
          </label>
        </div>
        <div class="form-row">
          <label data-i18n="settings_font_css">字体CSS</label>
          <textarea id="setting-renderTextCSS" rows="3"></textarea>
        </div>
        <div class="form-row" style="gap:6px;">
          <span style="font-size:12px;color:var(--text-secondary);" data-i18n="css_presets">CSS预设：</span>
          <button class="btn-secondary btn-sm" id="css-default" data-i18n="css_default">默认</button>
          <button class="btn-secondary btn-sm" id="css-center" data-i18n="css_center">居中</button>
          <button class="btn-secondary btn-sm" id="css-center-bold" data-i18n="css_center_bold">居中+粗体</button>
          <button class="btn-secondary btn-sm" id="css-rounded" data-i18n="css_rounded">圆角+居中</button>
          <button class="btn-secondary btn-sm" id="css-uppercase" data-i18n="css_uppercase">大写+居中</button>
          <button class="btn-secondary btn-sm" id="css-rounded-uppercase" data-i18n="css_rounded_uppercase">圆角+大写</button>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title" data-i18n="settings_openai">OpenAI兼容API（可选）</div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="setting-useOpenAI" />
            <span data-i18n="settings_enable_openai">启用OpenAI兼容API</span>
          </label>
        </div>
        <div id="openai-section" style="display:none;">
          <div class="form-row">
            <label><span data-i18n="settings_ocr_method">OCR方法</span></label>
            <select id="setting-ocrMethod">
              <option value="paddleocr" data-i18n="settings_ocr_paddleocr">PaddleOCR（本地）</option>
              <option value="imagetrans" data-i18n="settings_ocr_imagetrans">ImageTrans</option>
            </select>
          </div>
          <div class="form-row">
            <label><span data-i18n="settings_api_url">API URL</span></label>
            <input type="text" id="setting-openaiURL" class="wide" />
          </div>
          <div class="form-row">
            <label><span data-i18n="settings_api_key">API Key</span></label>
            <input type="password" id="setting-openaiKey" class="wide" />
          </div>
          <div class="form-row">
            <label><span data-i18n="settings_model">模型</span></label>
            <input type="text" id="setting-openaiModel" />
          </div>
          <div class="form-row">
            <label><span data-i18n="settings_prompt">提示词</span></label>
            <textarea id="setting-openaiPrompt" rows="4"></textarea>
          </div>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title" data-i18n="settings_image_processing">图片处理（用于PaddleOCR）</div>
        <div class="form-row">
          <label><span data-i18n="settings_x_spacing">X间距（px）</span></label>
          <input type="number" id="setting-xSpacing" min="0" max="200" />
          <label><span data-i18n="settings_y_spacing">Y间距（px）</span></label>
          <input type="number" id="setting-ySpacing" min="0" max="200" />
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="setting-useYOLODetection" />
            <span data-i18n="settings_use_yolo">使用YOLO检测文字</span>
          </label>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="setting-useYOLOForJapanese" />
            <span data-i18n="settings_use_yolo_jp">日语使用YOLO检测</span>
          </label>
        </div>
      </div>

      <div class="settings-card">
        <div class="settings-card-title" data-i18n="settings_ui_lang">界面语言</div>
        <div class="form-row">
          <select id="setting-uiLanguage">
            <option value="" data-i18n="options_ui_lang_default">浏览器默认</option>
            <option value="en" data-i18n="options_ui_lang_en">English</option>
            <option value="zh_CN" data-i18n="options_ui_lang_zh">中文</option>
          </select>
        </div>
      </div>

    </div>
  </div>


</main>

<!-- Status Mask -->
<div class="status-mask" id="status-mask">
  <div class="status-spinner"></div>
  <div class="status-text" id="status-text">翻译中...</div>
</div>

<!-- First-run Setup Modal -->
<div class="setup-modal" id="setup-modal">
  <div class="setup-modal-content">
    <h2>欢迎使用在线图片翻译器</h2>
    <p style="color:var(--text-secondary);margin-bottom:16px;">选择翻译方式和语言，开始使用。</p>

    <div class="setup-section">
      <div class="setup-label">翻译方式</div>
      <div class="setup-options">
        <label class="setup-option" id="setup-opt-server">
          <input type="radio" name="setup-mode" value="imagetrans" checked />
          <div class="setup-option-content">
            <strong>ImageTrans 服务器</strong>
            <span>连接到远程或本地 ImageTrans 服务器。效果最佳，自动处理排版和渲染。</span>
          </div>
        </label>
        <label class="setup-option" id="setup-opt-local">
          <input type="radio" name="setup-mode" value="local" />
          <div class="setup-option-content">
            <strong>本地 PaddleOCR</strong>
            <span>在浏览器中运行 OCR。免费，无需服务器。通过 MyMemory（免费）或自带 API Key（ChatGPT / DeepSeek / OpenAI 兼容服务）进行翻译。</span>
          </div>
        </label>
      </div>
    </div>

    <div class="setup-section">
      <div class="setup-label">语言</div>
      <div class="setup-row">
        <label>源语言 <select id="setup-sourceLang"></select></label>
        <label>→ 目标语言 <select id="setup-targetLang"></select></label>
      </div>
    </div>

    <div class="setup-section" id="setup-server-section">
      <div class="setup-label">服务器 URL（可选）</div>
      <input type="text" id="setup-serverURL" placeholder="https://service.basiccat.org:51043" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;" />
    </div>

    <button class="btn-primary" id="btn-setup-start" style="width:100%;padding:12px;font-size:15px;font-weight:600;margin-top:8px;">开始使用</button>
    <div style="text-align:center;margin-top:8px;">
      <a href="javascript:void(0)" id="btn-setup-skip" style="color:var(--text-secondary);font-size:13px;">跳过，使用默认设置</a>
    </div>
  </div>
</div>

<!-- Text Modal -->
<div class="text-modal" id="text-modal">
  <div class="text-modal-content">
    <div class="text-modal-header">
      <h3 data-i18n="text_detail">文字详情</h3>
      <button class="modal-close">✕</button>
    </div>
    <div class="text-modal-section">
      <div class="text-modal-label" data-i18n="source_text">原文</div>
      <div class="text-modal-source modal-source"></div>
    </div>
    <div class="text-modal-section">
      <div class="text-modal-label" data-i18n="target_text">译文</div>
      <div class="text-modal-target modal-target"></div>
    </div>
    <div class="text-modal-actions">
      <select class="modal-tts-select" id="modal-tts-select" style="flex:1;min-width:0;"></select>
      <button class="btn-secondary btn-sm modal-copy-btn" data-i18n="scan_copy">复制</button>
      <button class="btn-secondary btn-sm modal-tts-btn" data-i18n="scan_speak">朗读</button>
    </div>
  </div>
</div>

<noscript><div style="padding:20px;text-align:center;background:#fff3cd;border-bottom:1px solid #ffc107;font-size:14px;">此应用需要启用 JavaScript。请在浏览器设置中启用 JavaScript。</div></noscript>

<!-- Application Modules -->
<script>
  // 中文页面默认使用中文界面
  if (!localStorage.getItem('uiLanguage')) {
    localStorage.setItem('uiLanguage', 'zh_CN');
  }
</script>
<script src="/online-image-translator/js/settings.js"></script>
<script src="/online-image-translator/js/fittext.js"></script>
<script src="/online-image-translator/js/tts.js"></script>
<script src="/online-image-translator/js/ocr.js"></script>
<script src="/online-image-translator/js/render.js"></script>
<script src="/online-image-translator/js/translate.js"></script>
<script src="/online-image-translator/js/app.js"></script>

</body>
</html>
